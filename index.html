        let lang = 'si';

        function updateTimers() {
            const now = new Date().getTime();
            const dawnTime = new Date("2026-04-14T09:32:00").getTime();
            const mainDiff = dawnTime - now;

            if (mainDiff > 0) {
                document.getElementById('days').innerText = String(Math.floor(mainDiff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                document.getElementById('hours').innerText = String(Math.floor((mainDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById('mins').innerText = String(Math.floor((mainDiff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById('secs').innerText = String(Math.floor((mainDiff % (1000 * 60)) / 1000)).padStart(2, '0');
            } else {
                document.getElementById('cdHead').innerText = lang === 'si' ? "අලුත් අවුරුද්ද උදා වී ඇත!" : (lang === 'ta' ? "புத்தாண்டு பிறந்துவிட்டது!" : "New Year has Dawned!");
            }

            rituals.forEach(r => {
                const rTime = new Date(r.time).getTime();
                const diff = rTime - now;
                const timerEl = document.getElementById(`t-${r.id}`);
                const cardEl = document.getElementById(`card-${r.id}`);

                if (diff > 0) {
                    const h = Math.floor(diff / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    timerEl.innerText = lang === 'si' ? `තව: ${h}පැ ${m}මි ${s}තත්` : (lang === 'ta' ? `இன்னும்: ${h}ம ${m}நி ${s}வி` : `Left: ${h}h ${m}m ${s}s`);
                } else {
                    timerEl.innerText = lang === 'si' ? "නැකත උදා වී ඇත!" : (lang === 'ta' ? "சுப நேரம் ஆரம்பமானது!" : "Ritual is Active!");
                    timerEl.style.color = "var(--green)";
                    cardEl.classList.add('active-ritual');
                }
            });
        }

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(l === 'si' ? 'සිංහල' : l === 'ta' ? 'தமிழ்' : 'english')));
            
            const labels = { 
                si: ["දින","පැය","මිනිත්තු","තත්පර","අලුත් අවුරුදු උදාවට තව:","සිංහල අලුත් අවුරුදු නැකත් සීට්ටුව - 2026","ඔබ සැමට සුබ අලුත් අවුරුද්දක් වේවා!"], 
                ta: ["நாட்கள்","மணி","நிமிடம்","விநாடி","புத்தாண்டு பிறக்க இன்னும்:","சிங்கள புத்தாண்டு சுப நேரங்கள் - 2026","புத்தாண்டு வாழ்த்துக்கள்!"], 
                en: ["Days","Hours","Mins","Secs","Countdown to New Year:","New Year Rituals 2026","Happy New Year!"] 
            };
            
            document.getElementById('l-d').innerText = labels[lang][0];
            document.getElementById('l-h').innerText = labels[lang][1];
            document.getElementById('l-m').innerText = labels[lang][2];
            document.getElementById('l-s').innerText = labels[lang][3];
            document.getElementById('cdHead').innerText = labels[lang][4];
            document.getElementById('mainTitle').innerText = labels[lang][5];
            document.getElementById('fText').innerText = labels[lang][6];
            
            render();
            updateTimers();
        }

        function render() {
            const list = document.getElementById('ritualList');
            list.innerHTML = rituals.map(r => `
                <div class="card" id="card-${r.id}">
                    <div class="card-title">${r[lang][0]}</div>
                    <div class="card-desc">${r[lang][1]}</div>
                    <div class="ritual-timer" id="t-${r.id}">ගණනය කරමින්...</div>
                    <div class="action-btns">
                        <button class="btn-round" onclick="speak('${r[lang][1].replace(/'/g, "\\'")}')">🔊</button>
                        <button class="btn-round btn-fb" onclick="shareFB('${r[lang][0]}', '${r[lang][1]}')">f</button>
                    </div>
                    <div style="clear:both"></div>
                </div>
            `).join('');
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang === 'si' ? 'si-LK' : lang === 'ta' ? 'ta-IN' : 'en-US';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function shareFB(title, desc) {
            const url = window.location.href;
            const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(title + ": " + desc)}`;
            window.open(fbUrl, '_blank');
        }

        // --- PWA & Animation Logic ---
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'flower'; f.innerHTML = '✿';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }, 2000);

        setLang('si');
        setInterval(updateTimers, 1000);

        // --- 📲 PWA Install Logic ---
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

// බ්‍රවුසරය විසින් ඇප් එකක් ලෙස ඉන්ස්ටෝල් කළ හැකි බව හඳුනාගත් විට
window.addEventListener('beforeinstallprompt', (e) => {
    // Chrome 67 සහ ඊට පෙර සංස්කරණ වල ස්වයංක්‍රීයව prompt එක පෙන්වීම වැළැක්වීමට
    e.preventDefault();
    // සිදුවීම (event) පසුව භාවිතා කිරීමට තබා ගැනීම
    deferredPrompt = e;
    // ඉන්ස්ටෝල් බටන් එක පරිශීලකයාට පෙන්වීම
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        // ඉන්ස්ටෝල් කිරීමේ පණිවිඩය පෙන්වීම
        deferredPrompt.prompt();
        // පරිශීලකයා තෝරාගත්තේ කුමක්දැයි බැලීම
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            console.log('User accepted the install prompt');
        } else {
            console.log('User dismissed the install prompt');
        }
        deferredPrompt = null;
        installBtn.style.display = 'none';
    }
});

// ඇප් එක සාර්ථකව ඉන්ස්ටෝල් වූ පසු බටන් එක ඉවත් කිරීම
window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    deferredPrompt = null;
    console.log('PWA was installed');
});

// --- ⚙️ Service Worker Registration ---
// මෙය ඉන්ස්ටෝල් බටන් එක වැඩ කිරීමට අත්‍යවශ්‍ය වේ
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Selection Failed', err));
    });
}
        // --- 🔔 Notification Logic ---

// ඇප් එක Load වන විටම Permission ඉල්ලීම
if ("Notification" in window) {
    Notification.requestPermission().then(permission => {
        if (permission === "granted") {
            console.log("Notification permission granted.");
            scheduleAllNotifications(); // සියලුම නැකත් සඳහා Notification Schedule කිරීම
        }
    });
}

function scheduleAllNotifications() {
    const now = new Date().getTime();

    rituals.forEach(r => {
        const ritualTime = new Date(r.time).getTime();
        const diff = ritualTime - now;

        // නැකත ඉදිරියට තිබේ නම් පමණක් Schedule කරන්න
        if (diff > 0) {
            setTimeout(() => {
                sendNotification(r[lang][0], "දැන් නැකත උදාවී ඇත!");
            }, diff);
        }
    });
}

function sendNotification(title, body) {
    if (Notification.permission === "granted") {
        navigator.serviceWorker.ready.then(registration => {
            registration.showNotification(title, {
                body: body,
                icon: 'https://cdn-icons-png.flaticon.com/512/2698/2698194.png',
                vibrate: [200, 100, 200],
                badge: 'https://cdn-icons-png.flaticon.com/512/2698/2698194.png'
            });
        });
    }
}
        // --- 🎵 Background Music Logic ---
const bgMusic = document.getElementById('bgMusic');

// පරිශීලකයා මුලින්ම Screen එක මත Click කළ විට හෝ Install Button එක එබූ විට සින්දුව ආරම්භ වේ
document.addEventListener('click', () => {
    bgMusic.play().catch(error => {
        console.log("Autoplay blocked: User needs to interact first.");
    });
}, { once: true }); // මෙය ක්‍රියාත්මක වන්නේ පළමු Click එකේදී පමණි

// සින්දුව හැමවිටම Play වන බව තහවුරු කිරීමට (Optionally)
bgMusic.onpause = function() {
    bgMusic.play();
};
