              si: ["🌿 හිසතෙල් ගෑම", "අප්‍රේල් මස 15 වන බදාදා පූර්වභාග 06.55 ට කොළ පැහැති වස්ත්‍රාභරණයෙන් සැරසී නැගෙනහිර දිශාව බලා හිසට කොහොඹ පත් ද පයට කොලොන් පත් ද තබා තෙල් ගා ස්නානය මැනවි."], 
              ta: ["🌿 எண்ணெய் வைத்தல்", "ஏப்ரல் 15 புதன்கிழமை முற்பகல் 06.55 மணிக்கு பச்சை ஆடை அணிந்து கிழக்கு நோக்கி எண்ணெய் வைத்து நீராடவும்."], 
              en: ["🌿 Anointing Oil", "On Wednesday, April 15th at 06.55 AM, dressed in green, face East and anoint oil on head before bathing."] },

            { id: "work", time: "2026-04-20T06:27:00", targetDir: 180,
              si: ["💼 රැකී රක්ෂා සඳහා පිටත්වීම", "අප්‍රේල් මස 20 වන සඳුදා පූර්වභාග 06.27 ට සුදු පැහැති වස්ත්‍රාභරණයෙන් සැරසී කිරි බතක් අනුභව කර දකුණු දිශාව බලා රැකී රක්ෂා සඳහා පිටත්වීම මැනවි."], 
              ta: ["💼 தொழிலுக்குச் செல்லுதல்", "ஏப்ரல் 20 திங்கட்கிழமை முற்பகல் 06.27 மணிக்கு வெள்ளை ஆடை அணிந்து தெற்கு நோக்கி தொழிலுக்குப் புறப்படவும்."], 
              en: ["💼 Leaving for Work", "On Monday, April 20th at 06.27 AM, dressed in white, face South and depart for work after having milk rice."] },

            { id: "plant", time: "2026-04-23T09:01:00", targetDir: 0,
              si: ["🌱 පැළ සිටුවීම", "අප්‍රේල් මස 23 වන බ්‍රහස්පතින්දා පූර්වභාග 09.01 ට රන්වන් පැහැති වස්ත්‍රාභරණයෙන් සැරසී උතුරු දිශාව බලා පැළ සිටුවීම මැනවි."], 
              ta: ["🌱 மரக்கன்று நடுதல்", "ஏப்ரல் 23 வியாழக்கிழமை முற்பகல் 09.01 மணிக்கு பொன்னிற ஆடை அணிந்து வடக்கு நோக்கி கன்று நடவும்."], 
              en: ["🌱 Planting Saplings", "On Thursday, April 23rd at 09.01 AM, dressed in golden, face North and plant saplings."] }
        ];

        let lang = 'si';
        let notifiedRituals = new Set();

        function updateTimers() {
            const now = new Date().getTime();
            const dawnTime = new Date("2026-04-14T09:32:00").getTime();
            const mainDiff = dawnTime - now;

            if (mainDiff > 0) {
                document.getElementById('days').innerText = String(Math.floor(mainDiff / 86400000)).padStart(2, '0');
                document.getElementById('hours').innerText = String(Math.floor((mainDiff % 86400000) / 3600000)).padStart(2, '0');
                document.getElementById('mins').innerText = String(Math.floor((mainDiff % 3600000) / 60000)).padStart(2, '0');
                document.getElementById('secs').innerText = String(Math.floor((mainDiff % 60000) / 1000)).padStart(2, '0');
            } else {
                document.getElementById('cdHead').innerText = lang === 'si' ? "අලුත් අවුරුද්ද උදා වී ඇත!" : (lang === 'ta' ? "புத்தாண்டு பிறந்துவிட்டது!" : "New Year has Dawned!");
            }

            rituals.forEach(r => {
                const rTime = new Date(r.time).getTime();
                const diff = rTime - now;
                const timerEl = document.getElementById(`t-${r.id}`);
                const cardEl = document.getElementById(`card-${r.id}`);

                if (diff > 0) {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    timerEl.innerText = lang === 'si' ? `තව: ${h}පැ ${m}මි ${s}තත්` : (lang === 'ta' ? `இன்னும்: ${h}ம ${m}நி ${s}வி` : `Left: ${h}h ${m}m ${s}s`);
                    
                    // Notification Logic: 5 minutes before
                    if (diff <= 300000 && !notifiedRituals.has(r.id)) {
                        sendNotification(r[lang][0]);
                        notifiedRituals.add(r.id);
                    }
                } else {
                    if (diff > -2000 && diff < 0) { // On the exact moment
                        navigator.vibrate([500, 200, 500]);
                    }
                    timerEl.innerText = lang === 'si' ? "නැකත උදා වී ඇත!" : (lang === 'ta' ? "சுப நேரம் ஆரம்பமானது!" : "Ritual is Active!");
                    timerEl.style.color = "var(--green)";
                    cardEl.classList.add('active-ritual');
                }
            });
        }

        // --- Notification System ---
        function sendNotification(title) {
            if (!("Notification" in window)) return;
            if (Notification.permission === "granted") {
                new Notification("අවුරුදු නැකත් මතක් කිරීම", {
                    body: `${title} ආරම්භ වීමට තව මිනිත්තු 5 ක් පමණි!`,
                    icon: "https://cdn-icons-png.flaticon.com/512/2698/2698194.png"
                });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        // --- Visual Compass Logic ---
        function initCompass() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', function(event) {
                    let compass = event.webkitCompassHeading || Math.abs(event.alpha - 360);
                    document.getElementById('visualCompass').style.transform = `rotate(${-compass}deg)`;
                    
                    // Check if aligned with target direction of current/next ritual (simple version)
                    let currentRitual = rituals.find(r => new Date(r.time) > new Date());
                    if (currentRitual && currentRitual.targetDir !== undefined) {
                        let diff = Math.abs(compass - currentRitual.targetDir);
                        if (diff < 15 || diff > 345) {
                            document.getElementById('dirIndicator').innerText = "නැකත් දිශාව හරියටම හරි! ✅";
                            document.getElementById('dirIndicator').style.color = "var(--green)";
                        } else {
                            document.getElementById('dirIndicator').innerText = "නියමිත දිශාවට දුරකථනය හරවන්න...";
                            document.getElementById('dirIndicator').style.color = "var(--maroon)";
                        }
                    }
                });
            }
        }

        // --- Mini Game Logic ---
        function breakPot() {
            const pot = document.getElementById('pot');
            const status = document.getElementById('gameStatus');
            pot.classList.add('broken');
            pot.innerText = "💥";
            status.innerText = "සුබ පැතුම්! ඔබ මුට්ටිය බින්දා! 🎉";
            navigator.vibrate(200);
            
            setTimeout(() => {
                pot.classList.remove('broken');
                pot.innerText = "🏺";
                status.innerText = "නැවත උත්සාහ කරන්න!";
            }, 3000);
        }

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${l}`).classList.add('active');
            const labels = { 
                si: ["දින","පැය","මිනිත්තු","තත්පර","අලුත් අවුරුදු උදාවට තව:","සිංහල අලුත් අවුරුදු නැකත් සීට්ටුව - 2026","ඔබ සැමට සුබ අලුත් අවුරුද්දක් වේවා!"], 
                ta: ["நாட்கள்","மணி","நிமிடம்","விநாடி","புத்தாண்டு பிறக்க இன்னும்:","சிங்கள புத்தாண்டு சுப நேரங்கள் - 2026","புத்தாண்டு வாழ்த்துக்கள்!"], 
                en: ["Days","Hours","Mins","Secs","Countdown to New Year:","New Year Rituals 2026","Happy New Year!"] 
            };
            document.getElementById('l-d').innerText = labels[lang][0];
            document.getElementById('l-h').innerText = labels[lang][1];
            document.getElementById('l-m').innerText = labels[lang][2];
            document.getElementById('l-s').innerText = labels[lang][3];
            document.getElementById('cdHead').innerText = labels[lang][4];
            document.getElementById('mainTitle').innerText = labels[lang][5];
            document.getElementById('fText').innerText = labels[lang][6];
            render();
            updateTimers();
        }

        function render() {
            const list = document.getElementById('ritualList');
            list.innerHTML = rituals.map(r => `
                <div class="card" id="card-${r.id}">
                    <div class="card-title">${r[lang][0]}</div>
                    <div class="card-desc">${r[lang][1]}</div>
                    <div class="ritual-timer" id="t-${r.id}">ගණනය කරමින්...</div>
                    <div class="action-btns">
                        <button class="btn-round" onclick="speak('${r[lang][1].replace(/'/g, "\\'")}')">🔊</button>
                        <button class="btn-round btn-fb" onclick="shareFB('${r[lang][0]}', '${r[lang][1]}')">f</button>
                    </div>
                </div>
            `).join('');
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang === 'si' ? 'si-LK' : lang === 'ta' ? 'ta-IN' : 'en-US';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function shareFB(title, desc) {
            const url = window.location.href;
            const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(title + ": " + desc)}`;
            window.open(fbUrl, '_blank');
        }

        // --- Animation & Audio Logic ---
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'flower'; f.innerHTML = '✿';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }, 2000);

        // PWA & Music logic stays same...
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('installBtn').style.display = 'none';
            }
        });

        const bgMusic = document.getElementById('bgMusic');
        const audioSource = document.getElementById('audioSource');
        const myPlaylist = ['aurudu.mp3', 'aurudu01.mp3', 'aurudu02.mp3'];
        let currentTrack = 0;

        document.addEventListener('click', () => {
            if (bgMusic.paused) bgMusic.play().catch(e => {});
        }, { once: true });

        bgMusic.onended = function() {
            currentTrack = (currentTrack + 1) % myPlaylist.length;
            audioSource.src = myPlaylist[currentTrack];
            bgMusic.load(); bgMusic.play();
        };

        // Initialize
        setLang('si');
        setInterval(updateTimers, 1000);
        initCompass();
        if (Notification.permission !== "granted") Notification.requestPermission();
    </script>
</body>
